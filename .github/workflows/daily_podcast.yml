name: Daily AI News Podcast

on:
  schedule:
    # 北京时间 10:00 = UTC 2:00
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 检查配置
        run: |
          HAS_KEY=false
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$DEEPSEEK_API_KEY" ] || [ -n "$OPENAI_API_KEY" ]; then
            HAS_KEY=true
          fi
          echo "LLM_KEY_SET=$HAS_KEY" >> $GITHUB_ENV

          HAS_TG=false
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            HAS_TG=true
          fi
          echo "TELEGRAM_SET=$HAS_TG" >> $GITHUB_ENV

          HAS_WX=false
          if [ -n "$WX_APPID" ] && [ -n "$WX_OPENID" ] && [ -n "$WX_TEMPLATE_ID" ]; then
            HAS_WX=true
          fi
          echo "WECHAT_SET=$HAS_WX" >> $GITHUB_ENV

          echo "LLM API Key: $HAS_KEY"
          echo "Telegram:     $HAS_TG"
          echo "WeChat:       $HAS_WX"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_OPENID: ${{ secrets.WX_OPENID }}
          WX_TEMPLATE_ID: ${{ secrets.WX_TEMPLATE_ID }}

      - name: 运行每日播客管线
        id: podcast
        run: python main.py --auto
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_SECRET: ${{ secrets.WX_SECRET }}
          WX_OPENID: ${{ secrets.WX_OPENID }}
          WX_TEMPLATE_ID: ${{ secrets.WX_TEMPLATE_ID }}
          AUDIO_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: output
          keep_files: false

      - name: 生成摘要
        if: always()
        run: |
          DATE_STR=$(TZ='Asia/Shanghai' date +%Y%m%d)
          {
            echo "## 📻 今日AI新闻播客"
            echo ""
            echo "**生成时间**: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') 北京时间"
            echo ""
            echo "| 配置项 | 状态 |"
            echo "|---|---|"
            echo "| LLM API Key | ${{ env.LLM_KEY_SET == 'true' && '✅' || '❌ 未设置' }} |"
            echo "| Telegram | ${{ env.TELEGRAM_SET == 'true' && '✅' || '⚠️ 未配置' }} |"
            echo "| WeChat | ${{ env.WECHAT_SET == 'true' && '✅' || '⚠️ 未配置' }} |"
            echo ""
            for domain_dir in output/${DATE_STR}/*/; do
              DOMAIN=$(basename "$domain_dir")
              SCRIPT_FILE="${domain_dir}script.json"
              if [ -f "$SCRIPT_FILE" ]; then
                TURNS=$(python -c "import json; print(len(json.load(open('$SCRIPT_FILE'))))")
                echo "✅ **${DOMAIN}** — ${TURNS} 轮对话"
                echo "🔊 [在线收听](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${DATE_STR}/${DOMAIN}/podcast_${DATE_STR}.mp3)"
                echo ""
              fi
            done
            if [ ! -d "output/${DATE_STR}" ] || [ -z "$(ls -A output/${DATE_STR}/ 2>/dev/null)" ]; then
              echo "⚠️ 播客生成失败，请查看上方日志"
            fi
          } >> $GITHUB_STEP_SUMMARY
